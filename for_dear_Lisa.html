<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта, Лиза!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(200,0,100,0.2);
            text-align: center;
            border: 2px solid white;
        }
        h1 {
            font-size: 3em;
            color: #ad1457;
            margin-bottom: 20px;
        }
        .name {
            font-size: 2.5em;
            color: #880e4f;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100%{transform:scale(1)}50%{transform:scale(1.05)}
        }
        .message {
            font-size: 1.4em;
            color: #4a0033;
            margin: 30px 0;
            line-height: 1.6;
        }
        .flowers {
            font-size: 3em;
            margin: 20px 0;
        }
        button {
            background: #ec407a;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.3em;
            cursor: pointer;
            margin: 20px 0;
            border: 2px solid white;
        }
        .surprise {
            display: none;
            background: #fce4ec;
            padding: 30px;
            border-radius: 30px;
            margin-top: 20px;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌸 С 8 Марта! 🌸</h1>
        <div class="name">Дорогая Лиза!</div>
        <div class="flowers">🌷🌼🌺🌷🌼🌺</div>
        <div class="message">
            Самая прекрасная, нежная и удивительная!<br>
            Пусть весна подарит море счастья!
        </div>
        <button onclick="showSurprise()">✨ Открыть сюрприз ✨</button>
        <div id="surpriseBlock" class="surprise">
            💝 Ты особенная! 💝<br><br>
            Пусть каждый день будет таким же красивым, как ты!<br><br>
            С любовью, твой тема
        </div>
    </div>
    <script>
        function showSurprise() {
            let block = document.getElementById('surpriseBlock');
            if(block.style.display == 'block') {
                block.style.display = 'none';
            } else {
                block.style.display = 'block';
            }
        }
    </script>
</body>
</html>
